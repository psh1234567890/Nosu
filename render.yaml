services:
  - type: web
    name: nosu-best
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: SERVE_STATIC_APP
        value: true
      - key: DATA_DIR
        value: /tmp/nosu-best-data
      - key: ALLOWED_ORIGINS
        value: https://nosu-best.onrender.com
      - key: RELEASE_VERSION
        value: 0.1.0
      - key: RELEASE_CHANNEL
        value: production
      - key: PHONE_CODE_HIDE_DEBUG
        value: true
      - key: AI_JUDGE_FORCE_LOCAL
        value: true
      - key: SMS_PROVIDER
        value: dev
      - key: SUPABASE_STORAGE_MODE
        value: snapshot
      - key: SESSION_SECRET
        sync: false
